<h3>{{ title }}</h3>
<button class="btn btn-primary my-3" [routerLink]="['/users/create']">Formulario</button>

@if (users.length == 0) {
  <div>No hay registros en el sistema</div>
} @else {
  <table class="table table-hover table-bordered table-striped">
    <thead>
      <tr>
        <th>id</th>
        <th>nombre</th>
        <th>apellido</th>
        <th>correo</th>
        <th>username</th>
        <th class="text-center">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (user of users; track $index) {
        <tr>
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.lastName }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.username }}</td>
          <td>
            <div class="row">
              <div class="col">
                <button class="btn btn-danger" (click)="onRemoveUser(user.id)">Eliminar</button>
              </div>
              <div class="col">
                <button class="btn btn-success" [routerLink]="['/users/edit', user.id]">
                  Actualizar
                </button>
              </div>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
}
